---
- name: Creation Deployment
  k8s:
    apply: true
    state: present
    verify_ssl: true
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: '{{ label_client_app_id }}-deployment'
        namespace: '{{ label_kube_namespace }}'
        labels:
          app: '{{ label_client_app_id }}'
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: '{{ label_client_app_id }}'
        template:
          metadata:
            labels:
              app: '{{ label_client_app_id }}'
          spec:
            containers:
              - name: '{{ label_client_app_id }}'
                image: '{{ app_image }}'
                ports:
                  - containerPort: 55432
                envFrom:
                  - configMapRef:
                      name: "{{ label_client_app_id }}-config"
                securityContext:
                  runAsUser: 1000
                  capabilities:
                    drop:
                      - all
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
